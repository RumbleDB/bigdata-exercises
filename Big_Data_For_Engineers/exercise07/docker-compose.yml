services:
  hadoop-base:
    build:
      context: ./docker-hadoop/base
    image: local/exercise07-hadoop-base
    pull_policy: never
    container_name: hadoop-base
    profiles: [ "build-only" ]

  namenode:
    build:
      context: ./docker-hadoop/namenode
    container_name: namenode
    restart: always
    ports:
      - 9870:9870
      - 9000:9000
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
      - ./:/mnt/exercise07
    environment:
      - CLUSTER_NAME=2.0.0-hadoop3.3.5-java11
      - ROLLING_UPGRADE=started
    env_file:
      - ./hadoop.env
    healthcheck:
      test: [ "CMD", "bash", "-ic", "hdfs dfsadmin -safemode get | grep -q OFF" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  datanode:
    build:
      context: ./docker-hadoop/datanode
    container_name: datanode
    restart: always
    depends_on:
      namenode:
        condition: service_started
    ports:
      - 9864:9864
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      SERVICE_PRECONDITION: "namenode:9870"
    env_file:
      - ./hadoop.env

  resourcemanager:
    build:
      context: ./docker-hadoop/resourcemanager
    container_name: resourcemanager
    restart: always
    depends_on:
      namenode:
        condition: service_healthy
      datanode:
        condition: service_started
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864"
    env_file:
      - ./hadoop.env

  nodemanager:
    build:
      context: ./docker-hadoop/nodemanager
    container_name: nodemanager
    restart: always
    depends_on:
      resourcemanager:
        condition: service_started
      datanode:
        condition: service_started
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    env_file:
      - ./hadoop.env

  historyserver:
    build:
      context: ./docker-hadoop/historyserver
    container_name: historyserver
    restart: always
    depends_on:
      resourcemanager:
        condition: service_started
      datanode:
        condition: service_started
    environment:
      SERVICE_PRECONDITION: "namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    env_file:
      - ./hadoop.env

  jupyter:
    container_name: jupyter
    image: quay.io/jupyter/scipy-notebook:2025-11-03
    restart: always
    ports:
      - 8888:8888
    user: root
    volumes:
      - ./:/mnt/exercise07
    command:
        - start.sh
        - jupyter
        - lab
        - --NotebookApp.token=''
        - --ServerApp.root_dir=/mnt/exercise07
        - --ServerApp.preferred_dir=/mnt/exercise07
      

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
